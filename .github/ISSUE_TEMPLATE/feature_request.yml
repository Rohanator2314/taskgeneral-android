name: Feature request
description: Suggest something new or an improvement to existing behaviour
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, check whether it already exists as an open issue or is listed in the README roadmap.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the context — what are you trying to do that you currently can't, or what friction are you experiencing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Task list / filtering / sorting
        - Task create / edit
        - Sync
        - App settings
        - Rust core / data model
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?

  - type: textarea
    id: taskwarrior-ref
    attributes:
      label: Taskwarrior desktop reference (if applicable)
      description: If this feature exists in Taskwarrior CLI, link to or describe how it works there
